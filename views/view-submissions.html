<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="submissions-title">Submissions</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/dark.css">
    <style>
        body {
            max-width: 1200px;
            margin: auto;
            padding: 2rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #555;
            padding: 0.75rem;
            text-align: left;
        }
    </style>
</head>
<body>
    <h1 id="submissions-header">Submissions</h1>
    <p><a href="/dashboard">Back to Dashboard</a></p>

    <div id="submissions-container">
        <!-- Submissions will be populated here -->
    </div>
    
    <div id="no-submissions" style="display: none;">
        <p>No submissions yet.</p>
    </div>

    <script>
        // Get form ID from URL
        const pathParts = window.location.pathname.split('/');
        const formId = pathParts[pathParts.length - 2];
        
        // Fetch submissions data
        fetch(`/api/forms/${formId}/submissions`)
            .then(response => {
                if (!response.ok) {
                    throw new Error('Form not found or access denied');
                }
                return response.json();
            })
            .then(data => {
                document.getElementById('submissions-title').textContent = `Submissions for ${data.form.title}`;
                document.getElementById('submissions-header').textContent = `Submissions for ${data.form.title}`;
                
                const container = document.getElementById('submissions-container');
                const noSubmissions = document.getElementById('no-submissions');
                
                if (data.submissions && data.submissions.length > 0) {
                    // Create table
                    const table = document.createElement('table');
                    
                    // Create header
                    const thead = document.createElement('thead');
                    const headerRow = document.createElement('tr');
                    
                    data.fields.forEach(field => {
                        const th = document.createElement('th');
                        th.textContent = field.label;
                        headerRow.appendChild(th);
                    });
                    
                    const dateTh = document.createElement('th');
                    dateTh.textContent = 'Submission Date';
                    headerRow.appendChild(dateTh);
                    
                    thead.appendChild(headerRow);
                    table.appendChild(thead);
                    
                    // Create body
                    const tbody = document.createElement('tbody');
                    
                    data.submissions.forEach(submission => {
                        const row = document.createElement('tr');
                        const submissionData = JSON.parse(submission.data);
                        
                        data.fields.forEach(field => {
                            const td = document.createElement('td');
                            td.textContent = submissionData[field.name] || '';
                            row.appendChild(td);
                        });
                        
                        const dateTd = document.createElement('td');
                        dateTd.textContent = new Date(submission.created_at).toLocaleString();
                        row.appendChild(dateTd);
                        
                        tbody.appendChild(row);
                    });
                    
                    table.appendChild(tbody);
                    container.appendChild(table);
                } else {
                    noSubmissions.style.display = 'block';
                }
            })
            .catch(error => {
                console.error('Error loading submissions:', error);
                document.body.innerHTML = '<h1>Access Denied</h1><p>You do not have permission to view these submissions or the form was not found.</p><p><a href="/dashboard">Back to Dashboard</a></p>';
            });
    </script>
</body>
</html>
