<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/dark.css">
    <style>
        body {
            max-width: 720px;
            margin: auto;
            padding: 2rem;
        }
        .error {
            color: red;
        }
    </style>
</head>
<body>
    <h1>Organizer Log In</h1>
    <div id="error-message" class="error" style="display: none;"></div>
    <form id="login-form">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
        <button type="submit">Log In</button>
    </form>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorMessage = document.getElementById('error-message');
            errorMessage.style.display = 'none'; // Hide previous errors
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password }),
                });

                if (response.ok) {
                    // The server will handle the redirect upon successful login
                    window.location.href = '/dashboard';
                } else {
                    const data = await response.json();
                    errorMessage.textContent = data.error || 'An unknown error occurred during login.';
                    errorMessage.style.display = 'block';
                }
            } catch (error) {
                console.error('Login failed:', error);
                errorMessage.textContent = 'Failed to connect to the server. Please ensure it is running and accessible.';
                errorMessage.style.display = 'block';
            }
        });
    </script>
    <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
    <p><a href="index.html">Back to public registration</a></p>
</body>
</html>
